# Local infrastructure for the Aqueduct CDC pipeline.

services:
  postgres:
    image: postgres:16
    container_name: aqueduct-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cdc
      POSTGRES_PASSWORD: cdc_pw   # local dev only; inject via secrets in real deployments
      POSTGRES_DB: yami
    ports:
      - "5432:5432"
    command:
      # wal_level=logical is the prerequisite for CDC: it makes PostgreSQL emit
      # row-level change records that Debezium decodes from the WAL.
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=10"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cdc -d yami"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.8.0
    container_name: aqueduct-kafka
    restart: unless-stopped
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@aqueduct-kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      # Advertised under the routable service name so other containers can reach it.
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://aqueduct-kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  connect:
    image: quay.io/debezium/connect:3.0.0.Final
    container_name: aqueduct-connect
    restart: unless-stopped
    depends_on:
      - kafka
      - postgres
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: aqueduct-kafka:9092
      GROUP_ID: aqueduct-connect
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: aqueduct-kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
      - connect
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: aqueduct
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: aqueduct-kafka:9092
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: debezium
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://aqueduct-connect:8083

  flink-jobmanager:
    build: ./flink
    image: aqueduct-flink
    container_name: aqueduct-flink-jobmanager
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: aqueduct-flink-jobmanager

  flink-taskmanager:
    image: aqueduct-flink
    container_name: aqueduct-flink-taskmanager
    restart: unless-stopped
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: aqueduct-flink-jobmanager
        taskmanager.numberOfTaskSlots: 4

  # Change-traffic driver. Assigned to the "load" profile so it stays out of the
  # default `docker compose up`, which brings up infrastructure only.
  generator:
    build: ./workload-generator
    image: aqueduct-generator
    container_name: aqueduct-generator
    profiles: ["load"]
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "9100:9100"
    environment:
      DATABASE_URL: postgresql://cdc:cdc_pw@aqueduct-postgres:5432/yami
      METRICS_PORT: 9100
      WORKERS: ${WORKERS:-8}
      TARGET_RATE: ${TARGET_RATE:-200}
      DURATION_SECONDS: ${DURATION_SECONDS:-0}
      BURST: ${BURST:-0}
      ANOMALY_RATE: ${ANOMALY_RATE:-0.02}

volumes:
  pgdata:
