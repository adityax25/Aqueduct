# Local infrastructure for the Aqueduct CDC pipeline.

services:
  postgres:
    image: postgres:16
    container_name: aqueduct-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cdc
      POSTGRES_PASSWORD: cdc_pw   # local dev only; inject via secrets in real deployments
      POSTGRES_DB: yami
    ports:
      - "5432:5432"
    command:
      # wal_level=logical is the prerequisite for CDC: it makes PostgreSQL emit
      # row-level change records that Debezium decodes from the WAL.
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=10"
      # Bounds WAL retained for a lagging replication slot. Without a limit, a
      # stalled CDC consumer holds WAL indefinitely until the disk fills and the
      # database stops accepting writes; past this bound the slot is invalidated
      # instead, trading a connector resnapshot for database availability.
      - "-c"
      - "max_slot_wal_keep_size=4GB"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cdc -d yami"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.8.0
    container_name: aqueduct-kafka
    restart: unless-stopped
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@aqueduct-kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      # Advertised under the routable service name so other containers can reach it.
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://aqueduct-kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # Retention is unlimited by default, which lets a long run fill the disk.
      # Size is capped per partition, and smaller segments make eviction granular,
      # since Kafka deletes whole segments and never the active one.
      KAFKA_LOG_RETENTION_BYTES: 8589934592      # 8 GiB per partition
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_SEGMENT_BYTES: 268435456         # 256 MiB

  connect:
    image: quay.io/debezium/connect:3.0.0.Final
    container_name: aqueduct-connect
    restart: unless-stopped
    depends_on:
      - kafka
      - postgres
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: aqueduct-kafka:9092
      GROUP_ID: aqueduct-connect
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: aqueduct-kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
      - connect
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: aqueduct
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: aqueduct-kafka:9092
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: debezium
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://aqueduct-connect:8083

  flink-jobmanager:
    build: ./flink
    image: aqueduct-flink
    container_name: aqueduct-flink-jobmanager
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    command: jobmanager
    volumes:
      # Checkpoint storage is shared: task managers write state files, the job
      # manager writes checkpoint metadata, and recovery reads both.
      - flink_checkpoints:/opt/flink/checkpoints
    # FLINK_PROPERTIES is converted verbatim into Flink's config.yaml, which does
    # not accept inline comments, so the rationale is kept here instead:
    #  - state.backend rocksdb: join state is kept on local disk with an off-heap
    #    block cache, since regular joins retain both sides and exceed the heap.
    #  - parallelism.default 2: partitions keyed state across subtasks. Kafka
    #    sources stay effectively single-threaded while topics have one partition;
    #    the joins and aggregations downstream do parallelize.
    #  - checkpointing: periodic consistent snapshots of state and source offsets,
    #    so a failed job resumes without gaps or duplicates. Unaligned checkpoints
    #    let barriers overtake buffered records, so snapshots still complete under
    #    backpressure.
    #  - restart-strategy exponential-delay: recovers from transient task failures
    #    instead of failing outright; backoff grows on repeated failures so a brief
    #    blip recovers quickly while a persistent fault does not restart in a loop.
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: aqueduct-flink-jobmanager
        jobmanager.memory.process.size: 1g
        state.backend.type: rocksdb
        state.backend.incremental: true
        parallelism.default: 2
        execution.checkpointing.interval: 30s
        execution.checkpointing.min-pause: 10s
        execution.checkpointing.timeout: 10min
        execution.checkpointing.unaligned: true
        execution.checkpointing.externalized-checkpoint-retention: RETAIN_ON_CANCELLATION
        execution.checkpointing.dir: file:///opt/flink/checkpoints
        restart-strategy.type: exponential-delay
        restart-strategy.exponential-delay.initial-backoff: 1s
        restart-strategy.exponential-delay.max-backoff: 2min
        restart-strategy.exponential-delay.backoff-multiplier: 2.0
        restart-strategy.exponential-delay.reset-backoff-threshold: 10min
        restart-strategy.exponential-delay.jitter-factor: 0.1

  flink-taskmanager:
    image: aqueduct-flink
    container_name: aqueduct-flink-taskmanager
    restart: unless-stopped
    depends_on:
      - flink-jobmanager
    command: taskmanager
    volumes:
      - flink_checkpoints:/opt/flink/checkpoints
    # See the job manager above for why state is kept in RocksDB rather than heap.
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: aqueduct-flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        taskmanager.memory.process.size: 3g
        state.backend.type: rocksdb
        state.backend.incremental: true

  # Change-traffic driver. Assigned to the "load" profile so it stays out of the
  # default `docker compose up`, which brings up infrastructure only.
  generator:
    build: ./workload-generator
    image: aqueduct-generator
    container_name: aqueduct-generator
    profiles: ["load"]
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "9100:9100"
    environment:
      DATABASE_URL: postgresql://cdc:cdc_pw@aqueduct-postgres:5432/yami
      METRICS_PORT: 9100
      WORKERS: ${WORKERS:-8}
      TARGET_RATE: ${TARGET_RATE:-200}
      DURATION_SECONDS: ${DURATION_SECONDS:-0}
      BURST: ${BURST:-0}
      ANOMALY_RATE: ${ANOMALY_RATE:-0.02}

volumes:
  pgdata:
  flink_checkpoints:
